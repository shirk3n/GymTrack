<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Mi Gimnasio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d0d0f;--bg2:#161619;--bg3:#1e1e23;--bg4:#242429;
  --brd:rgba(255,255,255,0.07);--brd2:rgba(255,255,255,0.15);
  --tx:#e8e6e0;--mu:#6b6960;--mu2:#9b9890;
  --ac:#c8f064;--ac2:#a0d040;
  --gn:#6abf6a;--bl:#6ab0f5;--or:#f5a050;--pu:#c090f0;--rd:#f06060;--ye:#f5d050;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;font-size:16px}
body{display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{padding:12px 14px 8px;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--bg)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;letter-spacing:1px;line-height:1}
.hdr-title span{color:var(--ac)}
.hard-day-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--brd2);background:var(--bg3);font-size:12px;font-weight:600;color:var(--mu2);cursor:pointer;touch-action:manipulation;transition:all 0.15s;white-space:nowrap}
.hard-day-btn.active{background:rgba(240,96,96,0.15);border-color:rgba(240,96,96,0.3);color:var(--rd)}
.week-nav{display:flex;align-items:center;gap:6px}
.wbtn{width:38px;height:38px;background:var(--bg3);border:1px solid var(--brd2);border-radius:10px;color:var(--tx);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.wbtn:active{background:var(--bg2)}
.wlbl{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--mu2);min-width:56px;text-align:center}

/* ── DAY PILLS ── */
.day-sel{display:flex;gap:6px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}
.day-sel::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:7px 12px;border-radius:28px;border:1px solid var(--brd);background:var(--bg2);cursor:pointer;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:54px;transition:all 0.15s}
.dpill:active{background:var(--bg3)}
.dpill.active{background:var(--ac);border-color:var(--ac)}
.dpill.today:not(.active){border-color:var(--brd2)}
.dp-lbl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--mu2)}
.dpill.active .dp-lbl{color:#000}
.dpill.today:not(.active) .dp-lbl{color:var(--tx)}
.dp-dot{width:6px;height:6px;border-radius:50%;background:var(--mu)}
.dpill.active .dp-dot{background:rgba(0,0,0,0.35)}

/* ── SCROLL / VIEWS ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.view{display:none;padding:14px 14px 20px}.view.active{display:block}

/* ── SESSION TIMER BAR ── */
.sess-timer-bar{display:none;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0}
.sess-timer-bar.show{display:flex}
.sess-timer-time{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--ac);line-height:1}
.sess-timer-lbl{font-size:12px;color:var(--mu2);margin-top:2px}
.sess-start-btn{padding:10px 20px;background:var(--ac);border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#000;cursor:pointer;touch-action:manipulation;letter-spacing:0.5px;text-transform:uppercase;transition:background 0.15s}
.sess-start-btn:active{background:var(--ac2)}
.sess-start-btn.running{background:var(--bg3);border:1px solid var(--rd);color:var(--rd)}
.hard-day-banner{display:none;background:rgba(240,96,96,0.08);border-bottom:1px solid rgba(240,96,96,0.15);padding:8px 14px;font-size:13px;color:var(--rd);flex-shrink:0;align-items:center;gap:8px}
.hard-day-banner.show{display:flex}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:12px 8px;text-align:center}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--ac);line-height:1}
.sl{font-size:12px;color:var(--mu);margin-top:4px}

/* ── BLOCK BANNER ── */
.blk{background:var(--bg2);border:1px solid var(--brd2);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.blk-n{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700}
.blk-m{font-size:13px;color:var(--mu2);text-align:right;line-height:1.5}

/* ── DELOAD / FATIGUE BANNERS ── */
.banner{display:none;border-radius:12px;padding:12px 14px;font-size:14px;margin-bottom:12px;line-height:1.5}
.banner.show{display:block}
.banner-deload{background:rgba(245,160,80,0.08);border:1px solid rgba(245,160,80,0.2);color:var(--or)}
.banner-fatigue{background:rgba(240,96,96,0.08);border:1px solid rgba(240,96,96,0.2);color:var(--rd)}
.banner-tomorrow{background:rgba(106,176,245,0.08);border:1px solid rgba(106,176,245,0.2);color:var(--bl)}

/* ── DAY HEADING ── */
.dhdg{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.dbadge{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:6px}
.bl{background:rgba(106,191,106,0.15);color:#6abf6a;border:1px solid rgba(106,191,106,0.25)}
.bt{background:rgba(106,176,245,0.15);color:#6ab0f5;border:1px solid rgba(106,176,245,0.25)}
.bf{background:rgba(192,144,240,0.15);color:#c090f0;border:1px solid rgba(192,144,240,0.25)}
.bfu{background:rgba(245,160,80,0.15);color:#f5a050;border:1px solid rgba(245,160,80,0.25)}
.br{background:rgba(255,255,255,0.05);color:var(--mu2);border:1px solid var(--brd2)}
.dtitle{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800}
.today-tag{font-size:12px;background:rgba(200,240,100,0.12);color:var(--ac);border:1px solid rgba(200,240,100,0.2);padding:3px 10px;border-radius:20px;font-weight:600}

/* ── SESSION PICKER ── */
.spicker{background:var(--bg2);border:1px solid var(--brd2);border-radius:12px;padding:14px;margin-bottom:16px}
.spicker-title{font-size:14px;color:var(--mu2);margin-bottom:10px}
.sbtns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px}
.sbtns2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sbtn{padding:11px 6px;background:var(--bg3);border:1px solid var(--brd);border-radius:10px;color:var(--mu2);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;cursor:pointer;touch-action:manipulation;text-align:center;transition:all 0.15s}
.sbtn:active{background:var(--bg)}
.sbtn.sel{border-color:var(--ac);color:var(--ac);background:rgba(200,240,100,0.08)}
.sbtn.sel-futbol{border-color:var(--or);color:var(--or);background:rgba(245,160,80,0.08)}
.sbtn.sel-descanso{border-color:var(--mu2);color:var(--mu2);background:rgba(255,255,255,0.04)}
.sbtn .sd{font-size:10px;font-family:'Barlow',sans-serif;font-weight:400;color:var(--mu);margin-top:2px;text-transform:none;display:block}

/* ── SECTION ── */
.sec{margin-bottom:18px}
.slbl{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);padding-bottom:7px;border-bottom:1px solid var(--brd);margin-bottom:10px}

/* ── EXERCISE CARD ── */
.exc{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:16px;margin-bottom:10px}
.exc.done{border-color:rgba(200,240,100,0.3);background:rgba(200,240,100,0.025)}
.exc.wu{opacity:0.65;border-style:dashed}
.ex-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.exchk{width:36px;height:36px;border-radius:50%;border:2px solid var(--brd2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px;font-weight:800;touch-action:manipulation;transition:all 0.15s;margin-top:2px}
.exchk.done{background:var(--ac);border-color:var(--ac);color:#000}
.exinfo{flex:1;min-width:0}
.exname{font-size:19px;font-weight:600;line-height:1.2;margin-bottom:3px}
.expres{font-size:14px;color:var(--mu2)}
.pr-tag{font-size:12px;font-weight:700;background:rgba(192,144,240,0.15);color:var(--pu);border:1px solid rgba(192,144,240,0.3);padding:2px 8px;border-radius:20px;margin-left:6px;white-space:nowrap}

/* ── SUGGESTION ── */
.sug{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:600;padding:6px 12px;border-radius:24px;margin-bottom:10px;line-height:1}
.sg-up{background:rgba(200,240,100,0.12);color:var(--ac);border:1px solid rgba(200,240,100,0.25)}
.sg-same{background:rgba(255,255,255,0.05);color:var(--mu2);border:1px solid var(--brd)}
.sg-down{background:rgba(240,96,96,0.1);color:var(--rd);border:1px solid rgba(240,96,96,0.2)}
.sg-deload{background:rgba(245,160,80,0.1);color:var(--or);border:1px solid rgba(245,160,80,0.2)}
.sg-first{background:rgba(106,176,245,0.1);color:var(--bl);border:1px solid rgba(106,176,245,0.2)}
.sg-hard{background:rgba(240,96,96,0.08);color:var(--rd);border:1px solid rgba(240,96,96,0.15)}

/* ── WEIGHT ROW ── */
.wrow{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--brd)}
.wlbl2{font-size:14px;color:var(--mu2);flex:1}
.winput{width:90px;height:56px;background:var(--bg3);border:2px solid var(--brd2);border-radius:12px;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;text-align:center;outline:none;-webkit-appearance:none;transition:border-color 0.15s}
.winput:focus{border-color:var(--ac)}
.winput::placeholder{color:var(--mu);font-size:17px;font-weight:400}
.wunit{font-size:15px;color:var(--mu)}
.tbtn{width:56px;height:56px;background:var(--bg3);border:1px solid var(--brd2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.tbtn:active{background:var(--bg)}
.tbtn svg{width:24px;height:24px;stroke:var(--mu2);fill:none;stroke-width:2;stroke-linecap:round}
.ptag{font-size:12px;padding:3px 9px;border-radius:20px;white-space:nowrap}
.ptup{background:rgba(200,240,100,0.1);color:var(--ac)}
.ptdown{background:rgba(240,96,96,0.1);color:var(--rd)}
.ptsame{background:rgba(255,255,255,0.05);color:var(--mu2)}

/* ── TIMER OVERLAY ── */
.tov{position:fixed;inset:0;background:rgba(13,13,15,0.98);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.tov.show{display:flex}
.tex{font-size:18px;font-weight:600;color:var(--tx);text-align:center;max-width:280px;padding:0 20px}
.tcircle{width:220px;height:220px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.tcircle svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.tsecs{font-family:'Barlow Condensed',sans-serif;font-size:70px;font-weight:800;color:var(--ac);line-height:1}
.tlbl{font-size:14px;color:var(--mu2);margin-top:4px}
.tskip{background:var(--bg3);border:1px solid var(--brd2);color:var(--mu2);padding:14px 40px;border-radius:12px;font-family:'Barlow',sans-serif;font-size:16px;cursor:pointer;touch-action:manipulation}

/* ── REST/FOOTBALL ── */
.rcard{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:20px;margin-bottom:14px}
.rtitle{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;margin-bottom:8px}
.rdesc{color:var(--mu2);font-size:15px;line-height:1.7;margin-bottom:14px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--brd);font-size:15px}
.mrow:last-child{border-bottom:none}
.mrow span:last-child{color:var(--mu2);font-size:14px}

/* ── TIP / INFO ── */
.tip{background:rgba(200,240,100,0.04);border:1px solid rgba(200,240,100,0.12);border-radius:12px;padding:14px;font-size:14px;color:var(--mu2);margin-top:10px;line-height:1.6}
.tip strong{color:var(--ac);font-weight:600}

/* ── NOTES ── */
.nta{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:15px;padding:14px;min-height:80px;resize:none;outline:none;-webkit-appearance:none}
.nta:focus{border-color:var(--brd2)}
.nta::placeholder{color:var(--mu)}

/* ── SAVE BAR ── */
.savebar{padding:10px 14px 14px;border-top:1px solid var(--brd);background:var(--bg);flex-shrink:0;display:none}
.savebar.show{display:block}
.savebtn{width:100%;height:56px;background:var(--ac);color:#000;border:none;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;touch-action:manipulation}
.savebtn:active{background:var(--ac2);transform:scale(0.98)}
.savebtn:disabled{background:var(--bg3);color:var(--mu)}
.srow{height:20px;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:5px}
.smsg{font-size:13px;color:var(--mu)}.smsg.ok{color:var(--gn)}.smsg.err{color:var(--rd)}
.spin{display:none;width:13px;height:13px;border:2px solid var(--brd2);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
.spin.show{display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── NUTRITION ── */
.nut-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px}
.nut-sub{font-size:13px;color:var(--mu2);margin-bottom:14px;line-height:1.5}
.hab-card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;overflow:hidden;margin-bottom:14px}
.hab-row{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--brd);cursor:pointer;touch-action:manipulation;transition:background 0.15s}
.hab-row:last-child{border-bottom:none}
.hab-row:active{background:var(--bg3)}
.hab-row.done-hab{background:rgba(200,240,100,0.03)}
.hab-check{width:32px;height:32px;border-radius:50%;border:2px solid var(--brd2);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:800;transition:all 0.15s}
.hab-check.done{background:var(--ac);border-color:var(--ac);color:#000}
.hab-info{flex:1}
.hab-name{font-size:16px;font-weight:500}
.hab-desc{font-size:13px;color:var(--mu2);margin-top:1px}
.nut-progress{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:14px}
.nut-prog-title{font-size:13px;color:var(--mu2);margin-bottom:8px}
.prog-bar-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:4px}
.prog-bar{height:100%;background:var(--ac);border-radius:4px;transition:width 0.4s}
.prog-label{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--ac)}
.nut-reminder{background:rgba(106,176,245,0.08);border:1px solid rgba(106,176,245,0.15);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--bl);margin-bottom:14px;line-height:1.6}

/* ── SEMANA VIEW ── */
.wkrow{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;touch-action:manipulation}
.wkrow:active{background:var(--bg3)}
.wkdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.wkinfo{flex:1}
.wkday{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
.wktype{font-size:14px;color:var(--mu2);margin-top:2px}
.wkst{font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;white-space:nowrap}
.ws-done{background:rgba(106,191,106,0.12);color:var(--gn)}
.ws-today{background:rgba(200,240,100,0.12);color:var(--ac)}
.ws-futbol{background:rgba(245,160,80,0.12);color:var(--or)}
.ws-pending{background:rgba(255,255,255,0.05);color:var(--mu)}
.ws-missed{background:rgba(240,96,96,0.1);color:var(--rd)}

/* ── CUERPO VIEW ── */
.bform{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:14px}
.bftitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:14px}
.bfields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bfield label{font-size:13px;color:var(--mu2);display:block;margin-bottom:5px}
.binput{width:100%;background:var(--bg3);border:1px solid var(--brd2);border-radius:10px;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;padding:11px 12px;outline:none;-webkit-appearance:none}
.binput::placeholder{color:var(--mu);font-size:15px;font-weight:400}
.bsbtn{width:100%;height:50px;background:var(--bg3);border:1px solid var(--brd2);border-radius:10px;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;touch-action:manipulation}
.bsbtn:active{background:var(--bg)}
.cwrap{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:14px;margin-bottom:12px}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;color:var(--mu2)}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--brd);font-size:15px}
.hrow:last-child{border-bottom:none}
.hdate{color:var(--mu2);font-size:13px}

/* ── CONFIG ── */
.csec{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:12px}
.ctit{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--mu2);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.cinp{width:100%;background:var(--bg3);border:1px solid var(--brd2);border-radius:10px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:15px;padding:14px;outline:none;-webkit-appearance:none;margin-bottom:10px}
.cinp::placeholder{color:var(--mu)}
.cbtn{width:100%;height:50px;background:var(--bg3);border:1px solid var(--brd2);border-radius:10px;color:var(--mu2);font-family:'Barlow',sans-serif;font-size:15px;cursor:pointer;touch-action:manipulation}
.cbtn:active{background:var(--bg)}
.cst{font-size:13px;margin-top:8px;min-height:18px}.cst.ok{color:var(--gn)}
.crow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--brd);font-size:15px}
.crow:last-child{border-bottom:none}
.crow span:last-child{color:var(--mu2);font-size:14px}

function getEx(dayId,st,name){

}

// ── PROGRESSION ENGINE ──
function getSug(dayId,st,ex){
  if(!ex.hw||!ex.rr)return null;
  const hard=isHardDay();
  if(isDeload())return{text:'Descarga — usa 60%',cls:'sg-deload'};
  // find last data
  let pw=week-1,pd=null;
  while(pw>=1&&!pd){
    const pst=sessDB[pw+'_'+dayId]||st;
    const e=db[pw]&&db[pw][dayId+'_'+pst]&&db[pw][dayId+'_'+pst][ex.n];
    if(e&&e.weight&&e.done){pd=e;break;}
    pw--;
  }
  if(!pd)return{text:'Primera vez — empieza ligero',cls:'sg-first'};
  let w=parseFloat(pd.weight);
  const r=parseInt(pd.reps||ex.rr[0]);
  const[lo,hi]=ex.rr;
  if(hard){
    const hw=Math.round(w*0.9*2)/2;
    return{text:`😓 Día difícil — ${hw}kg × ${lo} reps`,cls:'sg-hard',sw:hw};
  }
  // check if missed 2 weeks
  if(pw<week-3){w=Math.round(w*0.9*2)/2;return{text:`↓ Retomada — ${w}kg × ${lo} reps`,cls:'sg-down',sw:w};}
  if(r>=hi){
    const nw=Math.round((w+2.5)*2)/2;
    return{text:`↑ Sube a ${nw}kg × ${lo} reps`,cls:'sg-up',sw:nw};
  }
  return{text:`Mantén ${w}kg × ${r+1} reps`,cls:'sg-same',sw:w};
}

// ── FATIGUE DETECTION ──
function getWeekLoad(){
  let load=0;
  DAYS.forEach(d=>{
    const st=getSess(d.id);
    if(st==='PIERNA'||st==='TORSO')load+=2;
    else if(st==='FULLBODY')load+=1.5;
    else if(st==='FÚTBOL')load+=1.5;
  });
  return load;
}
function isFatiguedWeek(){return getWeekLoad()>=7;}
function tomorrowIsFutbol(){
  const tmrIdx=(dayIdx+1)%7;
  return getSess(DAYS[tmrIdx].id)==='FÚTBOL';

// ── REST TIMER ──
const ARC=603;
function startTimer(secs,name){
  clearInterval(tiInt);tiTotal=secs;tiLeft=secs;
  document.getElementById('tex').textContent=name||'';
  document.getElementById('tov').classList.add('show');
  updTimer();
  tiInt=setInterval(()=>{tiLeft--;if(tiLeft<=0){clearInterval(tiInt);navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);setTimeout(stopTimer,600);}updTimer();},1000);
}
function updTimer(){
  const s=document.getElementById('tsecs');s.textContent=tiLeft;
  document.getElementById('tarc').style.strokeDashoffset=ARC*(1-tiLeft/tiTotal);
  s.style.color=tiLeft<=10?'var(--rd)':'var(--ac)';
}
function stopTimer(){clearInterval(tiInt);document.getElementById('tov').classList.remove('show');}

    document.getElementById('sessStartBtn').textContent='⏹ Detener';
    document.getElementById('sessTimerLbl').textContent='Sesión en curso';
    sessInterval=setInterval(updSessTimer,1000);
  }else{
    sessRunning=false;clearInterval(sessInterval);
    const mins=Math.round((Date.now()-sessStart)/60000);
    sessTimeDB[dayKey()]=mins;save();
    document.getElementById('sessStartBtn').className='sess-start-btn';
    document.getElementById('sessStartBtn').textContent='▶ Iniciar';
    document.getElementById('sessTimerLbl').textContent=`Sesión: ${mins} min`;
    navigator.vibrate&&navigator.vibrate([100,50,100]);
  }
}
function updSessTimer(){
  if(!sessRunning||!sessStart)return;
  const s=Math.floor((Date.now()-sessStart)/1000);
  const m=Math.floor(s/60),sc=s%60;
  document.getElementById('sessTimerTime').textContent=`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

// ── NOTIFICATIONS ──
async function requestNotifications(){
  if(!('Notification' in window))return alert('Tu navegador no soporta notificaciones.');
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    localStorage.setItem('notif','1');
    scheduleNotification();
    alert('✓ Notificaciones activadas. Recibirás un aviso cada mañana a las 8:00.');
  }
}
function scheduleNotification(){
  if(localStorage.getItem('notif')!=='1')return;
  const now=new Date();
  const next=new Date(now);
  next.setHours(8,0,0,0);
  if(next<=now)next.setDate(next.getDate()+1);
  const ms=next-now;
  setTimeout(()=>{
    const day=DAYS.find(d=>d.id===todayId());
    const st=getSess(day.id);
    new Notification('Mi Gym 💪',{body:`Hoy toca: ${st} — ${getBlk()[st]?.focus||st}`,icon:''});
    scheduleNotification();
  },ms);
}

      ${['PIERNA','TORSO','FULLBODY'].map(t=>`<div class="sbtn${sess===t?' sel':''}" onclick="selSess('${day.id}','${t}')">

  h+=`<div class="sec"><div class="slbl">Ejercicios principales</div>`;

  h+=`<div style="height:16px"></div>`;

  document.getElementById('view-hoy').innerHTML=h;
}

      </div>
    </div>
    <div class="hab-card">`;

  HABITS.forEach(hab=>{
    const isDone=!!(habs[hab.id]);
    h+=`<div class="hab-row${isDone?' done-hab':''}" onclick="togHab('${day.id}','${hab.id}')">
      <div class="hab-check${isDone?' done':''}">${isDone?'✓':''}</div>

        <div class="hab-name">${hab.name}</div>
        <div class="hab-desc">${hab.desc}</div>
      </div>

  });
  h+=`</div>`;

  // monthly habit stats
  const months=buildHabStats();

    h+=`<div class="cwrap">
      <div class="ctitle">Cumplimiento mensual</div>
      <canvas id="habChartCanvas" style="max-height:160px"></canvas>

  }

  h+=`<div class="tip"><strong>Recuerda:</strong> La proteína es lo más importante. Si solo consigues una cosa al día, que sea cumplir los 3 bloques de proteína.</div>`;

  if(months.length>=2){
    setTimeout(()=>{
      const ctx=document.getElementById('habChartCanvas');if(!ctx)return;
      if(habChart)habChart.destroy();
      habChart=new Chart(ctx,{type:'bar',data:{
        labels:months.map(m=>m.label),
        datasets:[{label:'%',data:months.map(m=>m.pct),backgroundColor:'rgba(200,240,100,0.5)',borderColor:'var(--ac)',borderWidth:1,borderRadius:4}]
      },options:{responsive:true,plugins:{legend:{display:false}},scales:{
        x:{ticks:{color:'#6b6960',font:{size:11}},grid:{display:false}},
        y:{min:0,max:100,ticks:{color:'#6b6960',font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.05)'}}
      }}});
    },100);
  }
}

function buildHabStats(){
  const months={};
  Object.entries(habDB).forEach(([k,v])=>{
    const parts=k.split('_');if(parts.length<2)return;
    // find approximate date from week number - simplified
    const w=parseInt(parts[0]);
    const mo='Sem '+w;
    if(!months[mo])months[mo]={total:0,done:0};
    HABITS.forEach(h=>{
      months[mo].total++;
      if(v[h.id])months[mo].done++;
    });
  });
  return Object.entries(months).map(([k,v])=>({label:k,pct:Math.round(v.done/v.total*100)})).slice(-8);
}

        datasets:[{data:bodyDB.map(e=>e.weight||null),borderColor:'#c8f064',backgroundColor:'rgba(200,240,100,0.08)',pointBackgroundColor:'#c8f064',pointRadius:5,tension:0.3,fill:true,borderWidth:2}]
      },options:{responsive:true,plugins:{legend:{display:false}},scales:{
        x:{ticks:{color:'#6b6960',font:{size:12}},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{ticks:{color:'#6b6960',font:{size:12}},grid:{color:'rgba(255,255,255,0.05)'}}
      }}});
    },100);
  }
}

function saveBody2(){
  const w=parseFloat(document.getElementById('bi-w').value)||null;
  const bf=parseFloat(document.getElementById('bi-bf').value)||null;
  const wa=parseFloat(document.getElementById('bi-wa').value)||null;
  const ch=parseFloat(document.getElementById('bi-ch').value)||null;
  const hi=parseFloat(document.getElementById('bi-hi').value)||null;
  const ar=parseFloat(document.getElementById('bi-ar').value)||null;
  if(!w&&!bf&&!wa){alert('Introduce al menos el peso.');return;}
  bodyDB.push({date:new Date().toISOString(),weight:w,bf,waist:wa,chest:ch,hips:hi,arms:ar});
  saveBody();renderCuerpo();
}

// ══════════════════════════════════════════════════
// RENDER CONFIG
// ══════════════════════════════════════════════════
function renderConfig(){
  const url=localStorage.getItem(LS.url)||'';
  const pw=localStorage.getItem(LS.pw)||'';
  const blk=getBlk();
  const prs=Object.entries(prDB).sort((a,b)=>b[1].weight-a[1].weight).slice(0,10);
  const notifOk=localStorage.getItem('notif')==='1';

  let h=`<div class="csec">
    <div class="ctit">Notificaciones</div>
    <button class="notif-btn" onclick="requestNotifications()">${notifOk?'✓ Notificaciones activas':'🔔 Activar aviso matutino'}</button>
    <div style="font-size:13px;color:var(--mu2)">Recibirás un aviso cada mañana a las 8:00 con lo que toca ese día.</div>
  </div>
  <div class="csec">
    <div class="ctit">Tu peso (para proteína)</div>
    <input class="cinp" id="cfgPw" type="number" inputmode="decimal" placeholder="Peso en kg (ej: 80)" value="${pw}"/>
    <button class="cbtn" onclick="savePw()">Guardar peso</button>
    <div class="cst" id="pwSt"></div>
  </div>
  <div class="csec">
    <div class="ctit">Google Sheets</div>
    <input class="cinp" id="cfgUrl" type="url" placeholder="URL del Apps Script..." value="${url}"/>
    <button class="cbtn" onclick="saveCfgUrl()">Guardar URL</button>
    <div class="cst${url?' ok':''}" id="cfgSt">${url?'✓ URL configurada':''}</div>
  </div>
  <div class="csec">
    <div class="ctit">Plan actual</div>
    <div class="crow"><span>Bloque</span><span>${blk.label}</span></div>
    <div class="crow"><span>Semana global</span><span>${week}</span></div>
    <div class="crow"><span>Semana en bloque</span><span>${wib()} / 4</span></div>
    <div class="crow"><span>Próxima descarga</span><span>Sem. ${week+(4-wib())}</span></div>
  </div>
  <div class="csec">
    <div class="ctit">Récords personales</div>
    ${prs.length===0?`<div style="font-size:15px;color:var(--mu2)">Aún sin PRs. ¡A entrenar!</div>`:
    prs.map(([n,pr])=>`<div class="crow"><span style="font-size:13px">${n}</span><span style="color:var(--pu);font-weight:700;font-size:18px;font-family:'Barlow Condensed',sans-serif">${pr.weight}kg</span></div>`).join('')}
  </div>
  <div class="csec">
    <div class="ctit">Reglas de oro</div>
    <div style="font-size:15px;color:var(--mu2);line-height:2.1">
      🥩 Proteína: ${pw?Math.round(parseFloat(pw)*1.8)+'g':'~150g'}/día mínimo<br>
      😴 Sin 7h de sueño no hay recuperación posible<br>
      📈 Sube peso solo si completas todas las series<br>
      🔁 Sem. 4 siempre descarga — sin negociación<br>
      ⚽ Si juegas mañana, hoy entrenas ligero
    </div>
  </div>`;

  document.getElementById('view-config').innerHTML=h;
}

function savePw(){
  const v=document.getElementById('cfgPw').value.trim();
  localStorage.setItem(LS.pw,v);
  const st=document.getElementById('pwSt');
  st.textContent=v?`✓ Objetivo: ${Math.round(parseFloat(v)*1.8)}g proteína/día`:'';
  st.className='cst ok';
}
function saveCfgUrl(){
  const url=document.getElementById('cfgUrl').value.trim();
  localStorage.setItem(LS.url,url);
  const st=document.getElementById('cfgSt');
  st.textContent=url?'✓ URL guardada':'URL borrada';
  st.className='cst ok';
}

// ══════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════
function selDay(i){
  dayIdx=i;
  if(view==='hoy'||view==='semana'){
    view='hoy';
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-hoy').classList.add('active');
    document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
    document.getElementById('nt-hoy').classList.add('active');
  }
  renderDaySel();renderHoy();
  document.getElementById('scrollArea').scrollTop=0;
}
function jumpDay(i){selDay(i);}

function selSess(dayId,t){setSess(dayId,t);renderDaySel();renderHoy();}

function togEx(dayId,st,name){
  const e=getEx(dayId,st,name);
  e.done=!e.done;
  if(e.done&&e.weight){
    const w=parseFloat(e.weight);
    if(!isNaN(w)&&w>0&&(!prDB[name]||w>prDB[name].weight))prDB[name]={weight:w,week};
  }
  save();renderHoy();
}

function setW(dayId,st,name,val){
  getEx(dayId,st,name).weight=val;
  save();
}

function togHab(dayId,habId){
  const habs=getHabs(dayId);
  habs[habId]=!habs[habId];
  save();renderNutri();
}

function sv(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.ntab').forEach(el=>el.classList.remove('active'));
  document.getElementById('nt-'+v).classList.add('active');
  view=v;
  const isTrain=()=>{const s=getSess(DAYS[dayIdx].id);return s==='PIERNA'||s==='TORSO'||s==='FULLBODY';};
  document.getElementById('saveBar').className='savebar'+(v==='hoy'&&isTrain()?' show':'');
  if(v==='hoy'){renderDaySel();renderHoy();}
  else if(v==='semana')renderSemana();
  else if(v==='nutri')renderNutri();
  else if(v==='cuerpo')renderCuerpo();
  else if(v==='config')renderConfig();
}

function changeWeek(d){
  const n=week+d;if(n<1)return;
  week=n;
  document.getElementById('wlbl').textContent='SEM '+week;
  renderDaySel();
  if(view==='hoy')renderHoy();
  else if(view==='semana')renderSemana();
}

async function saveSession(){
  save();
  const url=localStorage.getItem(LS.url);
  const btn=document.getElementById('saveBtn');
  const sp=document.getElementById('spinner');
  const msg=document.getElementById('smsg');
  if(!url){
    msg.textContent='✓ Guardado';msg.className='smsg ok';
    setTimeout(()=>{msg.textContent='';msg.className='smsg';},2000);return;
  }
  btn.disabled=true;btn.textContent='Sincronizando...';sp.classList.add('show');
  const day=DAYS[dayIdx];
  const st=getSess(day.id);
  const blk=getBlk();
  const plan=blk[st]||{exercises:[]};
  const exercises=plan.exercises.filter(e=>!e.wu).map(ex=>({name:ex.n,...getEx(day.id,st,ex.n)}));
  const mins=sessTimeDB[dayKey()];
  try{
    await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({week,dayId:day.id,dayType:st,block:getBlk().label,exercises,notes:getNote(day.id),duration:mins,hardDay:isHardDay(),savedAt:new Date().toISOString()})});
    msg.textContent='✓ Sincronizado con Sheets';msg.className='smsg ok';
  }catch(e){msg.textContent='✓ Guardado localmente';msg.className='smsg ok';}
  btn.disabled=false;btn.textContent='Guardar sesión';sp.classList.remove('show');
  setTimeout(()=>{msg.textContent='';msg.className='smsg';},3000);
}

</script>
